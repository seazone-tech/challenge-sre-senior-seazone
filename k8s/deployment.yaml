apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-api
  namespace: seazone-challenge
  labels:
    app.kubernetes.io/name: reservation-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reservation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reservation-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: reservation-api
          image: reservation-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_VERSION
              value: "1.7.1"
            - name: LOG_LEVEL
              value: "INFO"
            - name: HEALTH_LATENCY_MS
              value: "0"
            - name: UPSTREAM_DELAY_MS
              value: "120"
            - name: UPSTREAM_TIMEOUT_MS
              value: "1000"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
