apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: reservation-api-slo
  namespace: seazone-challenge
  labels:
    app.kubernetes.io/name: reservation-api
    role: slo-alert
spec:
  groups:
    # --------------------------------------------------------------------------
    # Recording rules: pre-calculam a taxa de erro em multiplas janelas.
    # Centraliza a definicao do SLI num lugar so (DRY) e baixa o custo das queries
    # de alerta. Burn rate = error_ratio / (1 - SLO). SLO disponibilidade = 99,5%
    # => budget = 0,005 => burn = error_ratio / 0.005.
    # --------------------------------------------------------------------------
    - name: reservation-api.sli.recording
      rules:
        - record: job:reservation_api_request_error_ratio:rate5m
          expr: |
            sum(rate(reservation_api_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(reservation_api_http_requests_total[5m]))
        - record: job:reservation_api_request_error_ratio:rate30m
          expr: |
            sum(rate(reservation_api_http_requests_total{status=~"5.."}[30m]))
            /
            sum(rate(reservation_api_http_requests_total[30m]))
        - record: job:reservation_api_request_error_ratio:rate1h
          expr: |
            sum(rate(reservation_api_http_requests_total{status=~"5.."}[1h]))
            /
            sum(rate(reservation_api_http_requests_total[1h]))
        - record: job:reservation_api_request_error_ratio:rate6h
          expr: |
            sum(rate(reservation_api_http_requests_total{status=~"5.."}[6h]))
            /
            sum(rate(reservation_api_http_requests_total[6h]))

    # --------------------------------------------------------------------------
    # Alertas por burn rate multi-janela (Google SRE Workbook).
    # --------------------------------------------------------------------------
    - name: reservation-api.slo.alerts
      rules:
        - alert: ReservationApiErrorBudgetFastBurn
          expr: |
            job:reservation_api_request_error_ratio:rate5m > (14.4 * 0.005)
            and
            job:reservation_api_request_error_ratio:rate1h > (14.4 * 0.005)
          for: 2m
          labels:
            severity: critical
            service: reservation-api
          annotations:
            summary: "reservation-api queimando error budget RAPIDO (>14.4x) — page on-call"
            description: "Taxa de 5xx em 5m e 1h acima de 14.4x o budget. Budget de 30d some em ~2 dias. Verifique deploy recente."
            runbook_url: "https://github.com/chris-amaral/challenge-sre-senior-seazone/blob/main/docs/runbook-reservation-api.md"
            dashboard: "https://grafana.internal/d/reservation-api/reservation-api-slo"

        - alert: ReservationApiErrorBudgetSlowBurn
          expr: |
            job:reservation_api_request_error_ratio:rate30m > (6 * 0.005)
            and
            job:reservation_api_request_error_ratio:rate6h > (6 * 0.005)
          for: 15m
          labels:
            severity: warning
            service: reservation-api
          annotations:
            summary: "reservation-api em burn lento de error budget (>6x) — abrir ticket"
            description: "Degradacao sustentada de 5xx em 30m e 6h. Investigar em horario comercial antes de consumir o budget."
            runbook_url: "https://github.com/chris-amaral/challenge-sre-senior-seazone/blob/main/docs/runbook-reservation-api.md"
            dashboard: "https://grafana.internal/d/reservation-api/reservation-api-slo"

    # --------------------------------------------------------------------------
    # Alertas operacionais que faltaram no incidente (contexto rico).
    # --------------------------------------------------------------------------
    - name: reservation-api.ops.alerts
      rules:
        - alert: ReservationApiHighLatencyP95
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(reservation_api_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 0.3
          for: 5m
          labels:
            severity: warning
            service: reservation-api
          annotations:
            summary: "p95 de latencia acima de 300ms (SLO de latencia em risco)"
            runbook_url: "https://github.com/chris-amaral/challenge-sre-senior-seazone/blob/main/docs/runbook-reservation-api.md"

        - alert: ReservationApiPodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="seazone-challenge", pod=~"reservation-api.*"}[10m]) > 3
          for: 0m
          labels:
            severity: warning
            service: reservation-api
          annotations:
            summary: "Pods do reservation-api reiniciando (>3 em 10m) — possivel probe/OOM"
            runbook_url: "https://github.com/chris-amaral/challenge-sre-senior-seazone/blob/main/docs/runbook-reservation-api.md"
